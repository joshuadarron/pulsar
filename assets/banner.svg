<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <linearGradient id="pulse-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="30%" style="stop-color:rgba(255,255,255,0.6)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.9)"/>
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid dots -->
  <g opacity="0.07">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="300" fill="url(#dots)"/>
  </g>

  <!-- Wave decoration bottom -->
  <path d="M0 240 Q150 200 300 230 T600 220 T900 240 T1200 225 L1200 300 L0 300Z" fill="url(#wave1)"/>
  <path d="M0 260 Q200 230 400 255 T800 245 T1200 260 L1200 300 L0 300Z" fill="rgba(255,255,255,0.05)"/>

  <!-- Pulse/heartbeat line -->
  <polyline
    points="0,185 180,185 220,185 240,160 260,210 280,140 300,220 320,170 340,185 400,185 1200,185"
    fill="none"
    stroke="url(#pulse-line)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Decorative circles -->
  <circle cx="950" cy="70" r="60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <circle cx="980" cy="90" r="90" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Small data node dots -->
  <circle cx="100" cy="80" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="160" cy="60" r="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="130" cy="100" r="2.5" fill="rgba(255,255,255,0.18)"/>
  <line x1="100" y1="80" x2="160" y2="60" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="100" y1="80" x2="130" y2="100" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <circle cx="1100" cy="200" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1140" cy="170" r="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1080" cy="175" r="2.5" fill="rgba(255,255,255,0.18)"/>
  <line x1="1100" y1="200" x2="1140" y2="170" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="1100" y1="200" x2="1080" y2="175" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="108" width="44" height="44" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <polyline
    points="91,130 98,130 102,120 106,140 110,125 114,130"
    fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Title -->
  <text x="142" y="138" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">Pulse</text>

  <!-- Subtitle -->
  <text x="84" y="170" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="rgba(255,255,255,0.75)" letter-spacing="0.5">Automated DevRel Intelligence &amp; Content Agent</text>

  <!-- Tag pills -->
  <rect x="84" y="192" width="56" height="24" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <text x="112" y="208" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Next.js</text>

  <rect x="150" y="192" width="80" height="24" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <text x="190" y="208" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">RocketRide</text>

  <rect x="240" y="192" width="52" height="24" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <text x="266" y="208" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Neo4j</text>

  <rect x="302" y="192" width="74" height="24" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <text x="339" y="208" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">PostgreSQL</text>

  <rect x="386" y="192" width="56" height="24" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <text x="414" y="208" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Claude</text>
</svg>
