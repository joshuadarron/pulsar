services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pulsar
      POSTGRES_USER: pulsar
      POSTGRES_PASSWORD: pulsar_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/pulsar_dev
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
